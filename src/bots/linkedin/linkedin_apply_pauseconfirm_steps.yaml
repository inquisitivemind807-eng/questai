workflow_meta:
  title: "LinkedIn Easy Apply — Pause & Confirm"
  description: "Open a specific LinkedIn job URL and run Easy Apply flow — pauses after each key step for user confirmation"
  start_step: "init_context"

steps_config:
  init_context:
    step: 0
    func: "step0"
    transitions:
      direct_apply_requested: "open_check_login"
      step0_complete: "open_check_login"
      ctx_failed: "finish"
    timeout: 30
    on_timeout_event: "ctx_failed"

  open_check_login:
    step: 0.1
    func: "openCheckLogin"
    transitions:
      login_not_needed: "navigate_to_direct_apply_url"
      user_needs_to_login: "show_manual_login_prompt"
      cannot_determine_login_status: "navigate_to_direct_apply_url"
      no_available_page: "show_manual_login_prompt"
      failed_to_navigate: "show_manual_login_prompt"
      failed_checking_login_status: "show_manual_login_prompt"
    timeout: 30
    on_timeout_event: "failed_to_navigate"

  show_manual_login_prompt:
    step: 0.2
    func: "showManualLoginPrompt"
    transitions:
      login_successful: "navigate_to_direct_apply_url"
      login_failed: "finish"
      error_showing_manual_login: "finish"
    timeout: 300
    on_timeout_event: "login_failed"

  navigate_to_direct_apply_url:
    step: 0.5
    func: "navigateToDirectApplyUrl"
    transitions:
      navigated: "pc_after_navigate"
      navigation_failed: "finish"
    timeout: 30
    on_timeout_event: "navigation_failed"

  pc_after_navigate:
    step: 0.6
    func: "waitForNextConfirm"
    transitions:
      confirmed: "attempt_easy_apply"
    timeout: 360
    on_timeout_event: "confirmed"

  attempt_easy_apply:
    step: 1
    func: "attemptEasyApply"
    transitions:
      modal_opened_successfully: "pc_after_easy_apply"
      modal_failed_to_open: "application_failed"
      attempting_external_apply: "external_apply"
      no_jobs_page_found: "application_failed"
      no_job_to_process: "application_failed"
      job_card_not_found: "application_failed"
      no_easy_apply_button_found: "external_apply"
      failed_to_click_easy_apply: "external_apply"
      easy_apply_process_error: "application_failed"
    timeout: 30
    on_timeout_event: "easy_apply_process_error"

  pc_after_easy_apply:
    step: 1.5
    func: "waitForNextConfirm"
    transitions:
      confirmed: "fill_contact_info"
    timeout: 360
    on_timeout_event: "confirmed"

  fill_contact_info:
    step: 2
    func: "fillContactInfo"
    transitions:
      contact_info_filled: "pc_after_contact_fill"
      contact_info_error: "upload_resume"
    timeout: 30
    on_timeout_event: "contact_info_error"

  pc_after_contact_fill:
    step: 2.2
    func: "waitForNextConfirm"
    transitions:
      confirmed: "click_next_after_contact"
    timeout: 360
    on_timeout_event: "confirmed"

  click_next_after_contact:
    step: 2.3
    func: "clickNextButton"
    transitions:
      clicked_next: "pc_after_contact_next"
      ready_to_submit: "submit_application"
      click_next_error: "upload_resume"
    timeout: 15
    on_timeout_event: "click_next_error"

  pc_after_contact_next:
    step: 2.5
    func: "waitForNextConfirm"
    transitions:
      confirmed: "upload_resume"
    timeout: 360
    on_timeout_event: "confirmed"

  upload_resume:
    step: 3
    func: "uploadResume"
    transitions:
      resume_uploaded_successfully: "pc_after_resume"
      resume_not_required: "pc_after_resume"
      no_resume_path_configured: "pc_after_resume"
      resume_file_not_found: "pc_after_resume"
      proceeding_without_resume: "pc_after_resume"
      jobs_page_missing: "extract_employer_questions"
    timeout: 45
    on_timeout_event: "proceeding_without_resume"

  pc_after_resume:
    step: 3.4
    func: "waitForNextConfirm"
    transitions:
      confirmed: "click_next_to_questions"
    timeout: 360
    on_timeout_event: "confirmed"

  click_next_to_questions:
    step: 3.6
    func: "clickNextButton"
    transitions:
      clicked_next: "pc_before_questions"
      ready_to_submit: "pc_after_questions"
      click_next_error: "pc_before_questions"
    timeout: 15
    on_timeout_event: "click_next_error"

  pc_before_questions:
    step: 3.8
    func: "waitForNextConfirm"
    transitions:
      confirmed: "extract_employer_questions"
    timeout: 360
    on_timeout_event: "confirmed"

  handle_cover_letter:
    step: 4
    func: "handleCoverLetter"
    transitions:
      cover_letter_filled: "pc_after_cover_letter"
      cover_letter_not_required: "extract_employer_questions"
      cover_letter_error: "extract_employer_questions"
    timeout: 60
    on_timeout_event: "cover_letter_error"

  pc_after_cover_letter:
    step: 4.5
    func: "waitForNextConfirm"
    transitions:
      confirmed: "click_next_to_questions"
    timeout: 360
    on_timeout_event: "confirmed"

  extract_employer_questions:
    step: 5
    func: "extractEmployerQuestions"
    transitions:
      employer_questions_saved: "answer_questions"
      no_employer_questions: "click_next_after_questions"
      employer_questions_error: "click_next_after_questions"
    timeout: 45
    on_timeout_event: "employer_questions_error"

  answer_questions:
    step: 6
    func: "answerQuestions"
    transitions:
      questions_answered: "pc_after_answer"
      error_answering_questions: "submit_application"
      jobs_page_missing: "submit_application"
    timeout: 90
    on_timeout_event: "error_answering_questions"

  pc_after_answer:
    step: 6.3
    func: "waitForNextConfirm"
    transitions:
      confirmed: "click_next_after_questions"
    timeout: 360
    on_timeout_event: "confirmed"

  click_next_after_questions:
    step: 6.6
    func: "clickNextButton"
    transitions:
      clicked_next: "pc_after_questions"
      ready_to_submit: "submit_application"
      click_next_error: "pc_after_questions"
    timeout: 15
    on_timeout_event: "click_next_error"

  pc_after_questions:
    step: 6.8
    func: "waitForNextConfirm"
    transitions:
      confirmed: "submit_application"
    timeout: 360
    on_timeout_event: "confirmed"

  submit_application:
    step: 7
    func: "submitApplication"
    transitions:
      save_applied_job: "save_applied_job"
      application_failed: "application_failed"
      submit_application_error: "application_failed"
      no_jobs_page_found: "application_failed"
    timeout: 45
    on_timeout_event: "submit_application_error"

  save_applied_job:
    step: 8
    func: "saveAppliedJob"
    transitions:
      job_saved: "finish"
      save_job_failed: "application_failed"
    timeout: 30
    on_timeout_event: "save_job_failed"

  external_apply:
    step: 9
    func: "externalApply"
    transitions:
      save_external_job: "save_external_job"
      application_failed: "application_failed"
      jobs_page_missing: "application_failed"
    timeout: 30
    on_timeout_event: "application_failed"

  save_external_job:
    step: 10
    func: "saveExternalJob"
    transitions:
      external_job_saved: "finish"
      save_external_failed: "application_failed"
    timeout: 20
    on_timeout_event: "save_external_failed"

  application_failed:
    step: 11
    func: "applicationFailed"
    transitions:
      application_marked_failed: "finish"
      mark_failed_error: "finish"
    timeout: 20
    on_timeout_event: "mark_failed_error"

  finish:
    step: 12
    func: "finish"
    transitions:
      done: "done"
    timeout: 10
    on_timeout_event: "done"
